<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Classic Snake Game</title>
    <style>
        /* ── Reset & base ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: pan-y;
            /* prevent pull-to-refresh on vertical swipes */;
        }

        /* ── Game container ── */
        .game-wrapper {
            background: #16213e;
            padding: 20px 24px 28px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 560px;
            width: 100%;
            margin: 12px;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
        }

        /* ── Header: score + best ── */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            color: #e0e0e0;
            font-weight: 600;
            letter-spacing: 0.3px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .score-box,
        .best-box {
            background: #0f3460;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1rem;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .score-box span,
        .best-box span {
            color: #a8d8ea;
            font-weight: 300;
        }

        .score-box .value,
        .best-box .value {
            color: #f5c842;
            font-weight: 700;
            font-size: 1.3rem;
            min-width: 2rem;
            text-align: center;
        }

        .best-box .value {
            color: #6bcb77;
        }

        /* ── Canvas ── */
        .canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 480px;
            touch-action: none;
        }

        canvas {
            display: block;
            background: #0d1b2a;
            border-radius: 18px;
            box-shadow: inset 0 0 0 2px #2a3a5e, 0 12px 28px rgba(0, 0, 0, 0.7);
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            touch-action: none;
            cursor: pointer;
        }

        /* ── Touch controls (D-pad) ── */
        .touch-controls {
            width: 100%;
            max-width: 400px;
            margin-top: 18px;
            display: grid;
            grid-template-columns: 80px 80px 80px;
            grid-template-rows: 80px 80px 80px;
            gap: 6px;
            justify-content: center;
            touch-action: none;
        }

        .touch-btn {
            background: rgba(15, 52, 96, 0.85);
            border: 2px solid rgba(42, 58, 94, 0.6);
            border-radius: 18px;
            color: #e8f0f8;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.08s, transform 0.08s;
            box-shadow: 0 4px 0 #091a2e, 0 6px 16px rgba(0, 0, 0, 0.3);
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .touch-btn:active {
            background: rgba(26, 74, 122, 0.95);
            transform: scale(0.94);
            box-shadow: 0 1px 0 #091a2e;
        }

        .touch-btn.empty {
            background: transparent;
            box-shadow: none;
            border: none;
            cursor: default;
            pointer-events: none;
        }

        .touch-btn svg {
            width: 36px;
            height: 36px;
            fill: currentColor;
            pointer-events: none;
        }

        /* Grid placement */
        .btn-up {
            grid-column: 2;
            grid-row: 1;
        }
        .btn-left {
            grid-column: 1;
            grid-row: 2;
        }
        .btn-right {
            grid-column: 3;
            grid-row: 2;
        }
        .btn-down {
            grid-column: 2;
            grid-row: 3;
        }

        /* ── Controls row (restart + hint) ── */
        .controls-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-restart {
            background: #e94560;
            border: none;
            color: #f0f0f0;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 6px 0 #9e2a3f, 0 4px 12px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
            flex: 1;
            min-width: 120px;
            text-align: center;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-restart:hover {
            background: #ff5a7a;
        }
        .btn-restart:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #9e2a3f;
        }

        .hint {
            color: #7a8ba8;
            font-size: 0.8rem;
            background: #0f1f33;
            padding: 6px 16px;
            border-radius: 30px;
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        .hint kbd {
            background: #1e2f44;
            padding: 2px 8px;
            border-radius: 6px;
            color: #c0d0e0;
            font-weight: 700;
            margin: 0 1px;
        }

        /* ── Swipe hint overlay (fades on first swipe) ── */
        .swipe-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.12);
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            pointer-events: none;
            text-align: center;
            line-height: 1.4;
            transition: opacity 0.8s ease;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .swipe-hint.hidden {
            opacity: 0;
        }

        /* ── Responsive ── */
        @media (max-width: 520px) {
            .game-wrapper {
                padding: 14px 14px 20px;
                border-radius: 20px;
                margin: 8px;
            }
            .touch-controls {
                grid-template-columns: 64px 64px 64px;
                grid-template-rows: 64px 64px 64px;
                gap: 5px;
            }
            .touch-btn {
                border-radius: 14px;
                font-size: 1.8rem;
            }
            .touch-btn svg {
                width: 28px;
                height: 28px;
            }
            .score-box,
            .best-box {
                font-size: 0.85rem;
                padding: 4px 12px;
            }
            .score-box .value,
            .best-box .value {
                font-size: 1.1rem;
                min-width: 1.6rem;
            }
            .btn-restart {
                font-size: 0.9rem;
                padding: 8px 18px;
                min-width: 80px;
            }
            .hint {
                font-size: 0.7rem;
                padding: 4px 12px;
                white-space: normal;
            }
            .controls-row {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
        }

        @media (max-width: 400px) {
            .touch-controls {
                grid-template-columns: 52px 52px 52px;
                grid-template-rows: 52px 52px 52px;
                gap: 4px;
            }
            .touch-btn {
                border-radius: 12px;
                font-size: 1.4rem;
            }
            .touch-btn svg {
                width: 22px;
                height: 22px;
            }
        }

        @media (pointer: coarse) {
            /* Hide keyboard hint on touch devices */
            .hint kbd {
                display: none;
            }
            .hint::after {
                content: 'Swipe canvas · tap buttons';
                color: #7a8ba8;
            }
            .hint {
                white-space: normal;
            }
        }

        @media (pointer: fine) {
            /* On desktop, hide touch controls by default */
            .touch-controls {
                display: none;
            }
            /* Show a small note */
            .controls-row .hint kbd {
                display: inline;
            }
            .controls-row .hint::after {
                display: none;
            }
        }

        /* If touch is supported but we want to show touch controls on small screens */
        @media (max-width: 800px) {
            .touch-controls {
                display: grid !important;
            }
        }

        /* ── Prevent zoom on double-tap ── */
        .game-wrapper,
        canvas,
        .touch-btn {
            touch-action: manipulation;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- Header: Score & Best -->
        <div class="header">
            <div class="score-box">
                🍎 Score <span class="value" id="scoreDisplay">0</span>
            </div>
            <div class="best-box">
                🏆 Best <span class="value" id="bestDisplay">0</span>
            </div>
        </div>

        <!-- Canvas with swipe hint -->
        <div class="canvas-container">
            <canvas id="gameCanvas" width="480" height="480"></canvas>
            <div class="swipe-hint" id="swipeHint">↕ ↕<br />↔ ↔</div>
        </div>

        <!-- Touch D-pad controls -->
        <div class="touch-controls" id="touchControls">
            <div class="touch-btn btn-up" data-dir="up">
                <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/></svg>
            </div>
            <div class="touch-btn btn-left" data-dir="left">
                <svg viewBox="0 0 24 24"><path d="M4 12l8-8v16z"/></svg>
            </div>
            <div class="touch-btn btn-right" data-dir="right">
                <svg viewBox="0 0 24 24"><path d="M20 12l-8-8v16z"/></svg>
            </div>
            <div class="touch-btn btn-down" data-dir="down">
                <svg viewBox="0 0 24 24"><path d="M12 20l-8-8h16z"/></svg>
            </div>
            <!-- empty cells to keep grid -->
            <div class="touch-btn empty"></div>
            <div class="touch-btn empty"></div>
            <div class="touch-btn empty"></div>
            <div class="touch-btn empty"></div>
        </div>

        <!-- Controls row -->
        <div class="controls-row">
            <button class="btn-restart" id="restartBtn">⟳ Restart</button>
            <div class="hint">
                <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd>
                <span style="display:none;">&nbsp;or&nbsp;</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ─── DOM refs ────────────────────────────────────────────────
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');
            const bestSpan = document.getElementById('bestDisplay');
            const restartBtn = document.getElementById('restartBtn');
            const swipeHint = document.getElementById('swipeHint');

            // ─── Constants ──────────────────────────────────────────────
            const GRID_SIZE = 20;
            const TILE_SIZE = canvas.width / GRID_SIZE;

            const DIR = {
                UP: { dx: 0, dy: -1 },
                DOWN: { dx: 0, dy: 1 },
                LEFT: { dx: -1, dy: 0 },
                RIGHT: { dx: 1, dy: 0 }
            };

            // ─── State ──────────────────────────────────────────────────
            let snake = [];
            let food = { x: 8, y: 10 };
            let direction = DIR.RIGHT;
            let nextDirection = DIR.RIGHT;
            let score = 0;
            let best = 0;
            let gameOver = false;
            let win = false;
            let gameLoopInterval = null;
            let gameRunning = false;

            // Touch / swipe state
            let touchStartX = 0;
            let touchStartY = 0;
            let isSwiping = false;
            let swipeHintHidden = false;

            // ─── Load best from localStorage ────────────────────────────
            function loadBest() {
                try {
                    const stored = localStorage.getItem('snakeBest');
                    if (stored !== null) {
                        best = parseInt(stored, 10) || 0;
                    }
                } catch (_) { /* ignore */ }
                bestSpan.textContent = best;
            }

            function saveBest() {
                try {
                    localStorage.setItem('snakeBest', String(best));
                } catch (_) { /* ignore */ }
            }

            // ─── Helpers ────────────────────────────────────────────────
            function randomInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function isOnSnake(x, y, includeHead = true) {
                const start = includeHead ? 0 : 1;
                for (let i = start; i < snake.length; i++) {
                    if (snake[i].x === x && snake[i].y === y) return true;
                }
                return false;
            }

            function generateFood() {
                const totalCells = GRID_SIZE * GRID_SIZE;
                if (snake.length >= totalCells) {
                    win = true;
                    gameOver = true;
                    return false;
                }

                const freeCells = [];
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        if (!isOnSnake(x, y, true)) {
                            freeCells.push({ x, y });
                        }
                    }
                }

                if (freeCells.length === 0) {
                    win = true;
                    gameOver = true;
                    return false;
                }

                const idx = Math.floor(Math.random() * freeCells.length);
                food = freeCells[idx];
                return true;
            }

            // ─── Reset game ─────────────────────────────────────────────
            function resetGame() {
                if (gameLoopInterval) {
                    clearInterval(gameLoopInterval);
                    gameLoopInterval = null;
                }

                snake = [
                    { x: 9, y: 10 },
                    { x: 8, y: 10 },
                    { x: 7, y: 10 }
                ];
                direction = DIR.RIGHT;
                nextDirection = DIR.RIGHT;
                score = 0;
                gameOver = false;
                win = false;
                gameRunning = true;
                scoreSpan.textContent = '0';

                if (!generateFood()) {
                    food = { x: 5, y: 5 };
                }

                draw();
                startLoop();
            }

            // ─── Game loop ──────────────────────────────────────────────
            function step() {
                if (!gameRunning || gameOver) return;

                direction = nextDirection;

                const head = snake[0];
                const newHead = {
                    x: head.x + direction.dx,
                    y: head.y + direction.dy
                };

                if (newHead.x < 0 || newHead.x >= GRID_SIZE ||
                    newHead.y < 0 || newHead.y >= GRID_SIZE) {
                    gameOver = true;
                    gameRunning = false;
                    if (gameLoopInterval) {
                        clearInterval(gameLoopInterval);
                        gameLoopInterval = null;
                    }
                    draw();
                    return;
                }

                const isEating = (newHead.x === food.x && newHead.y === food.y);

                let newSnake = [newHead, ...snake];

                if (!isEating) {
                    newSnake.pop();
                }

                const headCollision = newSnake.slice(1).some(seg => seg.x === newHead.x && seg.y === newHead.y);
                if (headCollision) {
                    gameOver = true;
                    gameRunning = false;
                    if (gameLoopInterval) {
                        clearInterval(gameLoopInterval);
                        gameLoopInterval = null;
                    }
                    draw();
                    return;
                }

                snake = newSnake;

                if (isEating) {
                    score++;
                    scoreSpan.textContent = score;

                    if (score > best) {
                        best = score;
                        bestSpan.textContent = best;
                        saveBest();
                    }

                    const success = generateFood();
                    if (!success) {
                        gameOver = true;
                        gameRunning = false;
                        if (gameLoopInterval) {
                            clearInterval(gameLoopInterval);
                            gameLoopInterval = null;
                        }
                        draw();
                        return;
                    }
                }

                draw();
            }

            // ─── Start loop ─────────────────────────────────────────────
            function startLoop() {
                if (gameLoopInterval) {
                    clearInterval(gameLoopInterval);
                    gameLoopInterval = null;
                }
                gameLoopInterval = setInterval(step, 140);
            }

            // ─── Drawing ────────────────────────────────────────────────
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Grid
                ctx.strokeStyle = '#1c2f44';
                ctx.lineWidth = 0.6;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * TILE_SIZE, 0);
                    ctx.lineTo(i * TILE_SIZE, canvas.height);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * TILE_SIZE);
                    ctx.lineTo(canvas.width, i * TILE_SIZE);
                    ctx.stroke();
                }

                // Snake
                if (snake.length > 0) {
                    for (let i = 1; i < snake.length; i++) {
                        const seg = snake[i];
                        const x = seg.x * TILE_SIZE;
                        const y = seg.y * TILE_SIZE;
                        const pad = i === snake.length - 1 ? 3 : 2;
                        const radius = 5;

                        ctx.fillStyle = (i % 2 === 0) ? '#4ade80' : '#22c55e';
                        ctx.shadowColor = 'rgba(74, 222, 128, 0.25)';
                        ctx.shadowBlur = 8;
                        roundRect(ctx, x + pad, y + pad, TILE_SIZE - pad * 2, TILE_SIZE - pad * 2, radius);
                        ctx.fill();
                    }

                    const head = snake[0];
                    const hx = head.x * TILE_SIZE;
                    const hy = head.y * TILE_SIZE;
                    ctx.shadowColor = 'rgba(251, 191, 36, 0.5)';
                    ctx.shadowBlur = 14;
                    ctx.fillStyle = '#fbbf24';
                    roundRect(ctx, hx + 1.5, hy + 1.5, TILE_SIZE - 3, TILE_SIZE - 3, 7);
                    ctx.fill();

                    // Eyes
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#0d1b2a';
                    let ex1, ey1, ex2, ey2;
                    const d = direction;
                    const cx = hx + TILE_SIZE / 2;
                    const cy = hy + TILE_SIZE / 2;

                    if (d === DIR.RIGHT) {
                        ex1 = cx + 3;
                        ey1 = cy - 5;
                        ex2 = cx + 3;
                        ey2 = cy + 5;
                    } else if (d === DIR.LEFT) {
                        ex1 = cx - 3;
                        ey1 = cy - 5;
                        ex2 = cx - 3;
                        ey2 = cy + 5;
                    } else if (d === DIR.UP) {
                        ex1 = cx - 5;
                        ey1 = cy - 3;
                        ex2 = cx + 5;
                        ey2 = cy - 3;
                    } else {
                        ex1 = cx - 5;
                        ey1 = cy + 3;
                        ex2 = cx + 5;
                        ey2 = cy + 3;
                    }
                    ctx.beginPath();
                    ctx.arc(ex1, ey1, 3.5, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(ex2, ey2, 3.5, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.fillStyle = '#f0f9ff';
                    ctx.beginPath();
                    ctx.arc(ex1 + 1.2, ey1 - 1.2, 1.2, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(ex2 + 1.2, ey2 - 1.2, 1.2, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.shadowBlur = 0;
                }

                // Food
                if (food && !win) {
                    const fx = food.x * TILE_SIZE + TILE_SIZE / 2;
                    const fy = food.y * TILE_SIZE + TILE_SIZE / 2;
                    const pulse = 1 + 0.08 * Math.sin(Date.now() / 200);

                    const grad = ctx.createRadialGradient(fx, fy, 2, fx, fy, TILE_SIZE * 0.7);
                    grad.addColorStop(0, 'rgba(239, 68, 68, 0.35)');
                    grad.addColorStop(1, 'rgba(239, 68, 68, 0)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(fx, fy, TILE_SIZE * 0.7, 0, 2 * Math.PI);
                    ctx.fill();

                    const rad = (TILE_SIZE / 2 - 2) * pulse;
                    ctx.shadowColor = 'rgba(239, 68, 68, 0.6)';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath();
                    ctx.arc(fx, fy, rad, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.beginPath();
                    ctx.arc(fx - 3, fy - 4, 4, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.strokeStyle = '#4a7c3f';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(fx + 1, fy - rad + 1);
                    ctx.lineTo(fx + 4, fy - rad - 5);
                    ctx.stroke();
                    ctx.fillStyle = '#4a7c3f';
                    ctx.beginPath();
                    ctx.ellipse(fx + 6, fy - rad - 3, 4, 2.5, 0.5, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // Game Over overlay
                if (gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    if (win) {
                        ctx.fillStyle = '#fbbf24';
                        ctx.font = 'bold 44px "Segoe UI", sans-serif';
                        ctx.shadowColor = 'rgba(251, 191, 36, 0.4)';
                        ctx.shadowBlur = 30;
                        ctx.fillText('🏆 YOU WIN!', canvas.width / 2, canvas.height / 2 - 30);
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#e0e8f0';
                        ctx.font = '20px "Segoe UI", sans-serif';
                        ctx.fillText('Perfect board!', canvas.width / 2, canvas.height / 2 + 40);
                    } else {
                        ctx.fillStyle = '#f87171';
                        ctx.font = 'bold 44px "Segoe UI", sans-serif';
                        ctx.shadowColor = 'rgba(248, 113, 113, 0.3)';
                        ctx.shadowBlur = 30;
                        ctx.fillText('💀 GAME OVER', canvas.width / 2, canvas.height / 2 - 30);
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#c0c8d8';
                        ctx.font = '18px "Segoe UI", sans-serif';
                        ctx.fillText('Tap "Restart" to try again', canvas.width / 2, canvas.height / 2 + 40);
                    }
                    ctx.shadowBlur = 0;
                }
            }

            function roundRect(ctx, x, y, w, h, r) {
                ctx.beginPath();
                ctx.moveTo(x + r, y);
                ctx.lineTo(x + w - r, y);
                ctx.quadraticCurveTo(x + w, y, x + w, y + r);
                ctx.lineTo(x + w, y + h - r);
                ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                ctx.lineTo(x + r, y + h);
                ctx.quadraticCurveTo(x, y + h, x, y + h - r);
                ctx.lineTo(x, y + r);
                ctx.quadraticCurveTo(x, y, x + r, y);
                ctx.closePath();
            }

            // ─── Direction change ──────────────────────────────────────
            function setDirection(newDir) {
                if (!gameRunning || gameOver) return;
                if (direction.dx === -newDir.dx && direction.dy === -newDir.dy) {
                    return;
                }
                nextDirection = newDir;
            }

            // ─── Input: Keyboard ────────────────────────────────────────
            function handleKey(e) {
                const key = e.key;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
                    e.preventDefault();
                }

                let newDir = null;
                if (key === 'ArrowUp' || key === 'w' || key === 'W') newDir = DIR.UP;
                else if (key === 'ArrowDown' || key === 's' || key === 'S') newDir = DIR.DOWN;
                else if (key === 'ArrowLeft' || key === 'a' || key === 'A') newDir = DIR.LEFT;
                else if (key === 'ArrowRight' || key === 'd' || key === 'D') newDir = DIR.RIGHT;
                if (newDir) setDirection(newDir);
            }

            // ─── Touch: Swipe on canvas ────────────────────────────────
            function handleTouchStart(e) {
                const touch = e.touches[0];
                if (!touch) return;
                const rect = canvas.getBoundingClientRect();
                touchStartX = touch.clientX - rect.left;
                touchStartY = touch.clientY - rect.top;
                isSwiping = true;

                // Hide swipe hint on first touch
                if (!swipeHintHidden) {
                    swipeHintHidden = true;
                    swipeHint.classList.add('hidden');
                }
            }

            function handleTouchMove(e) {
                if (!isSwiping || !gameRunning || gameOver) return;
                e.preventDefault();

                const touch = e.touches[0];
                if (!touch) return;
                const rect = canvas.getBoundingClientRect();
                const currentX = touch.clientX - rect.left;
                const currentY = touch.clientY - rect.top;

                const dx = currentX - touchStartX;
                const dy = currentY - touchStartY;

                const minSwipe = 18;
                if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;

                let newDir = null;
                if (Math.abs(dx) > Math.abs(dy)) {
                    newDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
                } else {
                    newDir = dy > 0 ? DIR.DOWN : DIR.UP;
                }

                if (newDir) {
                    setDirection(newDir);
                    // Reset start point to avoid repeated triggers from same swipe
                    touchStartX = currentX;
                    touchStartY = currentY;
                }
            }

            function handleTouchEnd(e) {
                isSwiping = false;
            }

            // ─── Touch: D-pad buttons ──────────────────────────────────
            function setupDpad() {
                const btns = document.querySelectorAll('.touch-btn[data-dir]');
                btns.forEach(btn => {
                    const dir = btn.dataset.dir;
                    const handler = (e) => {
                        e.preventDefault();
                        let newDir = null;
                        if (dir === 'up') newDir = DIR.UP;
                        else if (dir === 'down') newDir = DIR.DOWN;
                        else if (dir === 'left') newDir = DIR.LEFT;
                        else if (dir === 'right') newDir = DIR.RIGHT;
                        if (newDir) setDirection(newDir);
                    };
                    btn.addEventListener('touchstart', handler, { passive: false });
                    btn.addEventListener('mousedown', handler);
                });
            }

            // ─── Animation loop for food pulse ──────────────────────────
            let animFrameId = null;

            function animationLoop() {
                if (!gameOver) {
                    draw();
                }
                animFrameId = requestAnimationFrame(animationLoop);
            }

            // ─── Init ────────────────────────────────────────────────────
            function init() {
                loadBest();
                resetGame();

                window.addEventListener('keydown', handleKey);

                // Canvas touch events for swipe
                canvas.addEventListener('touchstart', handleTouchStart, { passive: true });
                canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
                canvas.addEventListener('touchend', handleTouchEnd, { passive: true });
                canvas.addEventListener('touchcancel', handleTouchEnd, { passive: true });

                // D-pad
                setupDpad();

                // Restart button
                restartBtn.addEventListener('click', () => {
                    resetGame();
                    // Show swipe hint again after restart? Only if not hidden permanently
                    // We keep it hidden once dismissed.
                });
                restartBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    resetGame();
                }, { passive: false });

                // Hide swipe hint on any canvas interaction
                canvas.addEventListener('click', () => {
                    if (!swipeHintHidden) {
                        swipeHintHidden = true;
                        swipeHint.classList.add('hidden');
                    }
                });

                animationLoop();
            }

            // ─── Go ──────────────────────────────────────────────────────
            init();

        })();
    </script>
</body>
</html>
